name: egodata_app
description: Data Hat — egocentric capture for robot training data
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  usb_camera: ^0.3.0        # USB-C UVC external camera plugin
  permission_handler: ^11.0
  path_provider: ^2.1.0
  video_player: ^2.8.0
  http: ^1.1.0
  mime: ^1.0.4
  google_mlkit_pose_detection: ^0.10.0
  wakelock_plus: ^1.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  flutter_riverpod: ^2.4.0
  uuid: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
